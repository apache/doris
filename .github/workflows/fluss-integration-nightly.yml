name: Fluss Integration Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM UTC daily
  workflow_dispatch:

# Don't cancel nightly runs - let them complete
concurrency:
  group: fluss-nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  MAVEN_OPTS: -Dmaven.wagon.http.pool=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=30

jobs:
  #############################################################################
  # Comprehensive Matrix Testing
  #############################################################################
  matrix-tests:
    name: Test (JDK ${{ matrix.jdk }}, Fluss ${{ matrix.fluss_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        jdk: [11, 17, 21]
        fluss_version: ['0.6.0', 'latest']
        test_profile: ['basic', 'stress']

    steps:
      - name: Checkout Doris
        uses: actions/checkout@v4

      - name: Set random timezone
        run: |
          TIMEZONES=("America/New_York" "Europe/London" "Asia/Tokyo" "Australia/Sydney" "UTC")
          RANDOM_TZ=${TIMEZONES[$RANDOM % ${#TIMEZONES[@]}]}
          echo "TZ=$RANDOM_TZ" >> $GITHUB_ENV
          echo "Testing with timezone: $RANDOM_TZ"

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdk }}
          cache: 'maven'

      - name: Build Doris FE
        run: |
          cd fe/fe-common && mvn clean install -Dmaven.test.skip=true -Dcheckstyle.skip=true
          cd ../fe-core && mvn clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true

      - name: Run stress tests
        if: matrix.test_profile == 'stress'
        run: |
          echo "Running stress tests with 1000 tables..."
          # Add stress test implementation

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-jdk${{ matrix.jdk }}-fluss${{ matrix.fluss_version }}
          path: test-results/
          retention-days: 30

  #############################################################################
  # Performance Benchmarking
  #############################################################################
  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Doris
        uses: actions/checkout@v4

      - name: Run performance benchmarks
        run: |
          echo "Running performance benchmarks..."
          # Measure catalog creation time
          # Measure metadata operation latency
          # Track memory usage

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: benchmark-results/
          retention-days: 90

  #############################################################################
  # Summary Report
  #############################################################################
  nightly-report:
    name: Nightly Test Report
    runs-on: ubuntu-latest
    needs: [matrix-tests, performance-tests]
    if: always()

    steps:
      - name: Generate report
        run: |
          echo "Nightly test completed"
          echo "Matrix Tests: ${{ needs.matrix-tests.result }}"
          echo "Performance Tests: ${{ needs.performance-tests.result }}"
