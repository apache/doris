name: Fluss Integration Tests

on:
  pull_request:
    paths:
      - 'fe/fe-core/src/main/java/org/apache/doris/datasource/fluss/**'
      - 'fe/fe-core/src/test/java/org/apache/doris/datasource/fluss/**'
      - 'docker/integration-test/fluss/**'
      - '.github/workflows/fluss-integration.yml'
  push:
    branches:
      - feature/fluss-table-integration
  workflow_dispatch:
    inputs:
      fluss_version:
        description: 'Fluss version to test (e.g., 0.6.0, latest)'
        required: false
        default: 'latest'

# Cancel previous runs for same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Dmaven.wagon.http.pool=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=30 -Dmaven.wagon.http.retryHandler.requestSentEnabled=true
  FLUSS_VERSION: ${{ github.event.inputs.fluss_version || 'latest' }}

jobs:
  #############################################################################
  # Job 1: Build Doris FE with Fluss Support
  #############################################################################
  build-doris-fe:
    name: Build Doris FE (JDK ${{ matrix.jdk }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        jdk: [17]  # Add [11, 21] for comprehensive testing

    steps:
      - name: Checkout Doris
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h
          # Remove large unused dependencies
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/dotnet
          echo "After cleanup:"
          df -h

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdk }}
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-jdk${{ matrix.jdk }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-jdk${{ matrix.jdk }}-
            ${{ runner.os}}-maven-

      - name: Install fe-common
        working-directory: fe/fe-common
        run: |
          mvn clean install -Dmaven.test.skip=true -Dcheckstyle.skip=true

      - name: Build fe-core with Fluss support
        working-directory: fe/fe-core
        run: |
          mvn clean package -Dmaven.test.skip=true -Dcheckstyle.skip=true

      - name: Verify Fluss classes in JAR
        run: |
          echo "Checking for Fluss classes in doris-fe.jar..."
          jar tf fe/fe-core/target/doris-fe.jar | grep -i "org/apache/doris/datasource/fluss" || {
            echo "ERROR: Fluss classes not found in JAR"
            exit 1
          }
          echo "SUCCESS: Fluss integration classes found"

      - name: List Fluss dependencies
        run: |
          echo "Fluss client dependencies:"
          jar tf fe/fe-core/target/lib/*.jar | grep -i fluss || echo "No Fluss dependencies found"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Package FE for Docker
        run: |
          mkdir -p output/fe/{bin,conf,lib,webroot}
          cp -r bin/*_fe.sh output/fe/bin/
          cp -r conf/fe.conf conf/ldap.conf output/fe/conf/
          cp fe/fe-core/target/doris-fe.jar output/fe/lib/
          cp -r fe/fe-core/target/lib/* output/fe/lib/
          cp -r webroot/* output/fe/webroot/

      - name: Build Doris FE Docker image
        working-directory: output/fe
        run: |
          cat > Dockerfile << 'EOF'
          FROM apache/doris:fe-3.1.3
          COPY lib/doris-fe.jar /opt/apache-doris/fe/lib/
          COPY lib/*.jar /opt/apache-doris/fe/lib/
          LABEL description="Apache Doris FE with Fluss Catalog Support"
          LABEL version="3.1.3-fluss-ci"
          LABEL fluss.version="${FLUSS_VERSION}"
          EOF
          docker build -t doris-fe-fluss:ci .

      - name: Save Docker image
        run: |
          docker save doris-fe-fluss:ci | gzip > doris-fe-fluss-ci.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: doris-fe-fluss-jdk${{ matrix.jdk }}
          path: doris-fe-fluss-ci.tar.gz
          retention-days: 1

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-jdk${{ matrix.jdk }}
          path: |
            fe/fe-core/target/surefire-reports/
            fe/fe-common/target/surefire-reports/
          retention-days: 7

  #############################################################################
  # Job 2: Integration Tests
  #############################################################################
  integration-tests:
    name: Integration Tests (Fluss ${{ matrix.fluss_version }})
    runs-on: ubuntu-latest
    needs: build-doris-fe
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        fluss_version: ['latest']  # Add ['0.6.0', 'latest'] for multi-version testing
        test_suite: ['catalog', 'metadata']

    steps:
      - name: Checkout Doris
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: doris-fe-fluss-jdk17

      - name: Load Docker image
        run: |
          docker load < doris-fe-fluss-ci.tar.gz
          docker images | grep doris-fe-fluss

      - name: Update docker-compose with CI image
        working-directory: docker/integration-test/fluss
        run: |
          sed -i 's|image: doris-fe-fluss:latest|image: doris-fe-fluss:ci|g' docker-compose.yml

      - name: Start Fluss cluster
        working-directory: docker/integration-test/fluss
        run: |
          docker-compose up -d zookeeper minio
          sleep 10
          docker-compose up -d minio-init
          sleep 5
          docker-compose up -d fluss-coordinator fluss-tablet-server
          echo "Waiting for Fluss cluster to be ready..."
          sleep 30

      - name: Verify Fluss cluster health
        run: |
          docker ps
          docker logs fluss-coordinator | tail -20
          docker logs fluss-tablet-server | tail -20

      - name: Start Flink for test data setup
        working-directory: docker/integration-test/fluss
        run: |
          docker-compose --profile flink up -d flink-jobmanager flink-taskmanager
          sleep 15

      - name: Setup test data via Flink
        working-directory: docker/integration-test/fluss
        run: |
          cat > /tmp/setup-data.sql << 'EOF'
          CREATE CATALOG fluss_catalog WITH (
              'type' = 'fluss',
              'bootstrap.servers' = 'fluss-coordinator:9123'
          );
          USE CATALOG fluss_catalog;
          CREATE DATABASE demo_db;
          USE demo_db;
          CREATE TABLE users (
              id INT PRIMARY KEY NOT ENFORCED,
              name STRING,
              email STRING,
              age INT,
              city STRING,
              created_at TIMESTAMP(3),
              updated_at TIMESTAMP(3)
          ) WITH ('bucket.num' = '4');
          CREATE TABLE orders (
              order_id INT,
              user_id INT,
              product STRING,
              amount DOUBLE,
              status STRING,
              order_date STRING,
              created_at TIMESTAMP(3),
              PRIMARY KEY (order_id, order_date) NOT ENFORCED
          ) PARTITIONED BY (order_date) WITH ('bucket.num' = '4');
          INSERT INTO users VALUES
              (1, 'Alice', 'alice@test.com', 28, 'SF', TIMESTAMP '2024-01-15 10:00:00', TIMESTAMP '2024-01-15 10:00:00'),
              (2, 'Bob', 'bob@test.com', 35, 'NY', TIMESTAMP '2024-01-15 11:00:00', TIMESTAMP '2024-01-15 11:00:00'),
              (3, 'Carol', 'carol@test.com', 42, 'LA', TIMESTAMP '2024-01-15 11:30:00', TIMESTAMP '2024-01-15 11:30:00');
          INSERT INTO orders VALUES
              (101, 1, 'Laptop', 1299.99, 'completed', '2024-01-15', TIMESTAMP '2024-01-15 10:30:00'),
              (102, 2, 'Mouse', 29.99, 'completed', '2024-01-15', TIMESTAMP '2024-01-15 11:15:00');
          EOF
          docker cp /tmp/setup-data.sql flink-jobmanager:/tmp/
          docker exec flink-jobmanager ./bin/sql-client.sh -f /tmp/setup-data.sql || {
            echo "Test data setup failed, but continuing..."
          }

      - name: Start Doris FE
        working-directory: docker/integration-test/fluss
        run: |
          docker-compose --profile doris up -d doris-fe
          echo "Waiting for Doris FE to be ready..."
          sleep 20

      - name: Wait for Doris FE to be healthy
        run: |
          for i in {1..30}; do
            if docker exec doris-fe mysql -h 127.0.0.1 -P 9030 -uroot -e "SELECT 1" &>/dev/null; then
              echo "Doris FE is ready"
              exit 0
            fi
            echo "Waiting for Doris FE... ($i/30)"
            sleep 2
          done
          echo "Doris FE failed to start"
          docker logs doris-fe
          exit 1

      - name: Run Catalog Tests
        if: matrix.test_suite == 'catalog'
        run: |
          cat > /tmp/catalog-tests.sql << 'EOF'
          -- Test 1: Create Fluss catalog
          CREATE CATALOG IF NOT EXISTS test_fluss_catalog PROPERTIES (
              'type' = 'fluss',
              'bootstrap.servers' = 'fluss-coordinator:9123'
          );

          -- Test 2: Verify catalog exists
          SHOW CATALOGS;

          -- Test 3: Switch to catalog
          SWITCH test_fluss_catalog;

          -- Test 4: Drop catalog
          DROP CATALOG test_fluss_catalog;
          EOF

          docker exec doris-fe mysql -h 127.0.0.1 -P 9030 -uroot < /tmp/catalog-tests.sql || {
            echo "Catalog tests failed"
            exit 1
          }
          echo "✅ Catalog tests passed"

      - name: Run Metadata Tests
        if: matrix.test_suite == 'metadata'
        run: |
          cat > /tmp/metadata-tests.sql << 'EOF'
          -- Test 1: Create catalog
          CREATE CATALOG IF NOT EXISTS fluss_catalog PROPERTIES (
              'type' = 'fluss',
              'bootstrap.servers' = 'fluss-coordinator:9123'
          );

          -- Test 2: Switch to catalog
          SWITCH fluss_catalog;

          -- Test 3: List databases
          SHOW DATABASES;

          -- Test 4: Use database
          USE demo_db;

          -- Test 5: List tables
          SHOW TABLES;

          -- Test 6: Describe table
          DESC users;
          EOF

          docker exec doris-fe mysql -h 127.0.0.1 -P 9030 -uroot < /tmp/metadata-tests.sql || {
            echo "Metadata tests failed"
            exit 1
          }
          echo "✅ Metadata tests passed"

      - name: Collect service logs
        if: always()
        run: |
          mkdir -p test-logs
          docker logs fluss-coordinator > test-logs/fluss-coordinator.log 2>&1
          docker logs fluss-tablet-server > test-logs/fluss-tablet-server.log 2>&1
          docker logs doris-fe > test-logs/doris-fe.log 2>&1
          docker logs flink-jobmanager > test-logs/flink-jobmanager.log 2>&1

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.test_suite }}-fluss${{ matrix.fluss_version }}
          path: test-logs/
          retention-days: 7

      - name: Docker compose down
        if: always()
        working-directory: docker/integration-test/fluss
        run: docker-compose down -v

  #############################################################################
  # Job 3: Test Report
  #############################################################################
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: integration-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate test summary
        run: |
          cat > test-summary.md << 'EOF'
          # Fluss-Doris Integration Test Results

          ## Build Information
          - **Branch**: ${{ github.ref }}
          - **Commit**: ${{ github.sha }}
          - **Run ID**: ${{ github.run_id }}
          - **Triggered by**: ${{ github.event_name }}

          ## Test Results
          EOF

          if [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "✅ All integration tests passed" >> test-summary.md
          else
            echo "❌ Integration tests failed" >> test-summary.md
          fi

          echo "" >> test-summary.md
          echo "## Artifacts" >> test-summary.md
          echo "Test logs are available in the artifacts section." >> test-summary.md

          cat test-summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
