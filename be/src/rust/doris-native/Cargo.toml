[workspace]
members = ["crates/doris-ffi"]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Apache-2.0"

[workspace.dependencies]
lance = "0.20"
lance-io = "0.20"
lance-index = "0.20"
lance-linalg = "0.20"
arrow = { version = "53", features = ["ffi"] }
arrow-array = "53"
arrow-schema = { version = "53", features = ["ffi"] }
tokio = { version = "1", features = ["rt"] }
futures = "0.3"

[profile.release]
panic = "unwind"
lto = "fat"
codegen-units = 1
strip = "symbols"

[profile.dev]
panic = "unwind"
